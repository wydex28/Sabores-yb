<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sin Conexión | Sabores Y&B</title>
    <!-- Favicon & Theme -->
    <link rel="icon" type="image/png" href="assets/images/logo.png">
    <meta name="theme-color" content="#00A859">
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            background-color: #FDFFFC;
            color: #24140a;
            font-family: 'Arial', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            width: 100vw;
            margin: 0;
            padding: 20px;
            overflow: hidden; /* Evita cualquier tipo de scroll vertical/horizontal */
            text-align: center;
        }
        .logo-container {
            width: 160px;
            height: 160px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1.5rem;
        }
        .logo {
            width: 100%;
            height: auto;
            object-fit: contain;
        }
        


        h1 {
            color: #24140a;
            font-size: 2.2rem;
            margin-bottom: 1rem;
            font-weight: 800;
        }
        p {
            color: #666;
            font-size: 1.1rem;
            max-width: 400px;
            line-height: 1.5;
            margin-bottom: 2rem;
        }
        .btn {
            background-color: #00A859;
            color: white;
            text-decoration: none;
            padding: 14px 28px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1.1rem;
            box-shadow: 0 4px 6px rgba(0, 168, 89, 0.2);
            transition: transform 0.2s, background-color 0.2s;
            cursor: pointer;
            border: none;
        }
        .btn:active {
            transform: scale(0.95);
            background-color: #008a49;
        }
    </style>
</head>
<body>
    <div class="logo-container">
        <!-- Logo de la marca -->
        <img src="assets/images/logo.png" alt="Sabores Y&B Logo" class="logo">
    </div>



    <h1>¡Sin Conexión!</h1>
    <p>Parece que te has quedado sin internet. <b>Sabores Y&B</b> necesita comunicarse con la web para procesar tu orden.</p>
    <button class="btn" onclick="window.location.reload()">Reintentar Conexión</button>
</body>
</html>
